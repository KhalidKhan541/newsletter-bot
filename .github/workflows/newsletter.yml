name: Daily Newsletter Publisher

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
  SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
  SUBSTACK_EMAIL: ${{ secrets.SUBSTACK_EMAIL }}

jobs:
  publish-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run newsletter agent
        run: python agent.py

      - name: Commit updated logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add analytics_log.csv publish_log.json
          git diff --cached --quiet || git commit -m "chore: update newsletter logs"
          git push
